<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagihan Sengkuni Net</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; margin: 0; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    .form-group { margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; color: #555; }
    select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
    .info { display: flex; flex-direction: column; }
    .nama { font-weight: bold; font-size: 16px; color: #222; }
    .detail { font-size: 13px; color: #666; margin-top: 5px; }
    .btn-wa { background-color: #25D366; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-wa:hover { background-color: #128C7E; }
    #loading { text-align: center; color: #888; font-style: italic; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tagihan Sengkuni Net</h2>
    
    <div class="form-group">
      <label for="bulanSelect">Pilih Bulan Tagihan:</label>
      <select id="bulanSelect">
        <option value="Januari">Januari</option>
        <option value="Februari">Februari</option>
        <option value="Maret" selected>Maret</option>
        <option value="April">April</option>
        <option value="Mei">Mei</option>
        <option value="Juni">Juni</option>
      </select>
    </div>

    <div id="loading">Memuat data pelanggan dari Spreadsheet...</div>
    <div id="listPelanggan"></div>
  </div>

  <script>
    // === LINK CSV SENGKUNI NET SUDAH DIMASUKKAN DI SINI ===
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV673nBl_6Wn_6eBjiJzoSQfHDn0VQRCNTGsjrdo2fLPFZenxVD1MBvatyIJ8mTGuZX58w5UI3uII9/pub?output=csv";
    // ======================================================

    Papa.parse(csvUrl, {
      download: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        // Kita potong baris pertama (index 0) karena itu adalah judul kolom (Header)
        const dataPelanggan = results.data.slice(1);
        tampilkanData(dataPelanggan);
      },
      error: function() {
        document.getElementById('loading').innerHTML = '<span style="color:red;">Gagal memuat data. Pastikan link CSV benar.</span>';
      }
    });

    function tampilkanData(data) {
      const container = document.getElementById('listPelanggan');
      
      data.forEach(row => {
        // Memastikan baris memiliki minimal 4 kolom (Nama, WA, ID, Tagihan)
        if (row.length < 4) return; 

        const nama = row[0];
        const noWa = row[1];
        const idPelanggan = row[2];
        const tagihan = row[3];

        // Lewati jika nama atau nomor WA kosong
        if (!nama || !noWa) return; 

        const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(tagihan || 0);

        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="info">
            <span class="nama">${nama}</span>
            <span class="detail">ID: ${idPelanggan} | ${formatRupiah}</span>
          </div>
          <button class="btn-wa" onclick="kirimWA('${nama}', '${noWa}', '${idPelanggan}', '${tagihan}')">Kirim WA</button>
        `;
        container.appendChild(div);
      });
    }

    function kirimWA(nama, noWa, idPelanggan, tagihan) {
      const bulan = document.getElementById('bulanSelect').value;
      
      // Bersihkan nomor WA dan pastikan diawali 62
      let hp = String(noWa).replace(/[^0-9]/g, '');
      if (hp.startsWith('0')) {
        hp = '62' + hp.substring(1);
      }

      const formatRupiah = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(tagihan || 0);

      // Format Pesan WhatsApp
      const pesan = yth *${nama}*,\n\nIni adalah informasi tagihan WiFi *Sengkuni Net* untuk bulan *${bulan}*.\n\nID Pelanggan: *${idPelanggan}*\nTotal tagihan: *${formatRupiah}*\n\nMohon untuk segera melakukan pembayaran. Terima kasih! 🙏`;

      // Buka WhatsApp
      window.open(`https://wa.me/${hp}?text=${encodeURIComponent(pesan)}`, '_blank'); 
    }
  </script>
</body>
</html>
