<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagihan Sengkuni Net</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
    .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; border-bottom: 2px solid #25D366; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
    .info { display: flex; flex-direction: column; flex: 1; }
    .nama { font-weight: bold; font-size: 16px; color: #333; }
    .detail { font-size: 13px; color: #777; margin-top: 4px; }
    .btn-wa { background-color: #25D366; color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-wa:hover { background-color: #128C7E; }
    .btn-wa:disabled { background-color: #ccc; cursor: not-allowed; }
    #loading { text-align: center; color: #666; font-style: italic; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tagihan Sengkuni Net</h2>
    
    <div class="form-group">
      <label>Pilih Bulan Tagihan:</label>
      <select id="bulanSelect">
        <option value="Januari">Januari</option>
        <option value="Februari">Februari</option>
        <option value="Maret" selected>Maret</option>
        <option value="April">April</option>
        <option value="Mei">Mei</option>
        <option value="Juni">Juni</option>
        <option value="Juli">Juli</option>
        <option value="Agustus">Agustus</option>
        <option value="September">September</option>
        <option value="Oktober">Oktober</option>
        <option value="November">November</option>
        <option value="Desember">Desember</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tanggal Jatuh Tempo:</label>
      <input type="number" id="tglTempo" value="4" placeholder="Contoh: 4">
    </div>

    <div id="loading">Memuat data pelanggan...</div>
    <div id="listPelanggan"></div>
  </div>

  <script>
    // Token Fonnte milik EKOLESTIYO
    const TOKEN_FONNTE = "CEjeWxk7WvpFJaNL94Km"; 

    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV673nBl_6Wn_6eBjiJzoSQfHDn0VQRCNTGsjrdo2fLPFZenxVD1MBvatyIJ8mTGuZX58w5UI3uII9/pub?output=csv";

    Papa.parse(csvUrl, {
      download: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        const dataPelanggan = results.data.slice(1);
        tampilkanData(dataPelanggan);
      },
      error: function() {
        document.getElementById('loading').innerHTML = '<span style="color:red;">Gagal memuat data CSV.</span>';
      }
    });

    function tampilkanData(data) {
      const container = document.getElementById('listPelanggan');
      data.forEach(row => {
        if (!row[0] || row[0].trim() === "") return;

        const nama = row[0].trim();
        const noWa = row[1] ? row[1].toString().trim() : "";
        const idPelanggan = row[2] ? row[2].trim() : "-";
        const tagihanRaw = row[3] ? row[3].toString().replace(/[^0-9]/g, '') : "0";
        
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="info">
            <span class="nama">${nama}</span>
            <span class="detail">ID: ${idPelanggan} | Rp ${tagihanRaw}</span>
          </div>
          <button class="btn-wa" onclick="kirimWA(this, '${nama.replace(/'/g, "\\'")}', '${noWa}', '${idPelanggan}', '${tagihanRaw}')">Kirim WA</button>
        `;
        container.appendChild(div);
      });
    }

    async function kirimWA(btn, nama, noWa, idPelanggan, tagihan) {
      const bulan = document.getElementById('bulanSelect').value;
      const tgl = document.getElementById('tglTempo').value;
      const tahun = new Date().getFullYear();
      
      let hp = noWa.replace(/[^0-9]/g, '');
      if (hp.startsWith('0')) hp = '62' + hp.substring(1);

      const pesan = `sistem chat otomatis tidak perlu di balas❌\n` +
                    `Pelanggan SENGKUNI NET\n` +
                    `Yth. *${nama}*\n` +
                    `Kami sampaikan tagihan layanan internet bulan *${bulan}.${tahun}*\n` +
                    `Dengan ID Pelanggan *${idPelanggan}*\n` +
                    `Sebesar *Rp ${tagihan}*\n` +
                    `Pembayaran paling lambat di tanggal *${tgl}*\n` +
                    `Pembayaran nunggu tukang narik\n` +
                    `Admin bendahara : RENDI dan FIRMAN\n` +
                    `untuk menghindari isolir kecepatan menurun otomatis di jaringan anda`;

      // Visual feedback: Tombol loading
      const originalText = btn.innerText;
      btn.innerText = "Mengirim...";
      btn.disabled = true;

      try {
        const response = await fetch('https://api.fonnte.com/send', {
          method: 'POST',
          headers: { 'Authorization': TOKEN_FONNTE },
          body: new URLSearchParams({
            'target': hp,
            'message': pesan,
            'countryCode': '62'
          })
        });

        const result = await response.json();

        if (result.status) {
          btn.innerText = "Terkirim ✅";
          btn.style.backgroundColor = "#128C7E";
        } else {
          alert("Gagal: " + result.reason);
          btn.innerText = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        alert("Koneksi Error!");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
