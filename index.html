<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagihan Sengkuni Net</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
    .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1a1a1a; margin-bottom: 20px; border-bottom: 3px solid #25D366; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; font-size: 14px; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; background: #fff; }
    .item { border-bottom: 1px solid #eee; padding: 15px 0; }
    .info { margin-bottom: 12px; }
    .nama { font-weight: bold; font-size: 17px; color: #222; text-transform: capitalize; }
    .detail { font-size: 14px; color: #666; margin-top: 3px; }
    .actions { display: flex; gap: 8px; }
    .btn { border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; flex: 1; color: white; transition: 0.2s; text-align: center; }
    .btn-wa { background-color: #25D366; }
    .btn-lunas { background-color: #007bff; }
    .btn-lapor { background-color: #f39c12; }
    .btn:active { transform: scale(0.92); opacity: 0.9; }
    #loading { text-align: center; color: #888; font-style: italic; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tagihan Sengkuni Net</h2>
    
    <div class="form-group">
      <label>Pilih Bulan Tagihan:</label>
      <select id="bulanSelect">
        <option value="Januari">Januari</option>
        <option value="Februari">Februari</option>
        <option value="Maret">Maret</option>
        <option value="April">April</option>
        <option value="Mei">Mei</option>
        <option value="Juni" selected>Juni</option>
        <option value="Juli">Juli</option>
        <option value="Agustus">Agustus</option>
        <option value="September">September</option>
        <option value="Oktober">Oktober</option>
        <option value="November">November</option>
        <option value="Desember">Desember</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tanggal Jatuh Tempo:</label>
      <input type="number" id="tglTempo" value="4">
    </div>

    <div id="loading">Menghubungkan ke sistem...</div>
    <div id="listPelanggan"></div>
  </div>

  <script>
    // Konfigurasi Telegram dari User
    const TELEGRAM_TOKEN = "8669839359:AAGPkRpOiLlYoBc3t4IgxcAGSgKFC8v1SwU";
    const TELEGRAM_CHAT_ID = "7933777456";

    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV673nBl_6Wn_6eBjiJzoSQfHDn0VQRCNTGsjrdo2fLPFZenxVD1MBvatyIJ8mTGuZX58w5UI3uII9/pub?output=csv";

    Papa.parse(csvUrl, {
      download: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        tampilkanData(results.data.slice(1));
      },
      error: function() {
        document.getElementById('loading').innerHTML = '<span style="color:red;">Gagal memuat data Spreadsheet.</span>';
      }
    });

    function tampilkanData(data) {
      const container = document.getElementById('listPelanggan');
      data.forEach(row => {
        if (!row[0] || row[0].trim() === "") return;
        
        const nama = row[0].trim();
        const noWa = row[1] ? row[1].toString().trim() : "";
        const idPel = row[2] ? row[2].trim() : "-";
        const harga = row[3] ? row[3].toString().replace(/[^0-9]/g, '') : "0";
        
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="info">
            <span class="nama">${nama}</span>
            <span class="detail">ID: ${idPel} | <b>Rp ${parseInt(harga).toLocaleString('id-ID')}</b></span>
          </div>
          <div class="actions">
            <button class="btn btn-wa" onclick="kirimWA('${nama}', '${noWa}', '${idPel}', '${harga}')">WA</button>
            <button class="btn btn-lunas" onclick="markLunas(this)">Set Lunas</button>
            <button class="btn btn-lapor" onclick="laporTelegram('${nama}', '${harga}')">Lapor</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function markLunas(btn) {
      btn.style.backgroundColor = '#bdc3c7';
      btn.innerText = 'Lunas ✓';
      btn.disabled = true;
    }

    function kirimWA(nama, noWa, idPel, harga) {
      const bulan = document.getElementById('bulanSelect').value;
      const tgl = document.getElementById('tglTempo').value;
      const tahun = new Date().getFullYear();
      let hp = noWa.replace(/[^0-9]/g, '');
      if (hp.startsWith('0')) hp = '62' + hp.substring(1);

      const pesan = `sistem chat otomatis tidak perlu di balas❌\nPelanggan SENGKUNI NET\nYth. *${nama}*\nKami sampaikan tagihan layanan internet bulan *${bulan}.${tahun}*\nDengan ID Pelanggan *${idPel}*\nSebesar *Rp ${parseInt(harga).toLocaleString('id-ID')}*\nPembayaran paling lambat di tanggal *${tgl}*\nPembayaran nunggu tukang narik\nAdmin bendahara : RENDI dan FIRMAN\nuntuk menghindari isolir kecepatan menurun otomatis di jaringan anda`;
      
      window.open(`https://wa.me/${hp}?text=${encodeURIComponent(pesan)}`, '_blank');
    }

    function laporTelegram(nama, harga) {
      const bulan = document.getElementById('bulanSelect').value;
      const waktu = new Date().toLocaleString('id-ID');
      
      const text = `💰 *LAPORAN MASUK*\n` +
                   `---------------------------\n` +
                   `👤 Nama : *${nama}*\n` +
                   `📅 Bulan : ${bulan}\n` +
                   `💵 Jumlah : *Rp ${parseInt(harga).toLocaleString('id-ID')}*\n` +
                   `⏰ Waktu : ${waktu}\n` +
                   `---------------------------`;

      const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;

      fetch(url)
        .then(res => {
          if(res.ok) {
            alert('Berhasil Lapor ke Telegram!');
          } else {
            alert('Gagal Lapor! Periksa koneksi atau Bot.');
          }
        });
    }
  </script>
</body>
</html>
