<script>
// --- 1. KONFIGURASI ---
const TOKEN_FONNTE = "CEjeWxk7WvpFJaNL94Km";
const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwpSA_UfqSUzK6JFZkvJkrftgOqRjKL-HzA8OLtfAQEaOM3iC3H90YjXv6pI3D-kGQ/exec";

const csvPelanggan = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV673nBl_6Wn_6eBjiJzoSQfHDn0VQRCNTGsjrdo2fLPFZenxVD1MBvatyIJ8mTGuZX58w5UI3uII9/pub?output=csv";

// Link Bendahara 1 (Firman)
const csvBendahara1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQTBDau5GFAj3S8Gw4uI9N9pQCCW-O_00mnkI80fiFqQc5-Ps4RDHXdxMe_c0yFoGkAgpWgOcMsgXRr/pub?gid=0&single=true&output=csv";
// Link Bendahara 2 (Rendi)
const csvBendahara2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNyj1omItLn1LAdk7SFcS2-5zqFwKRVkby-Tx2bjac2QCIfo9YfCa2nEArS38yjvd9y5jAPc6xqSxY/pub?gid=0&single=true&output=csv";

let noFirman = "";
let noRendi = "";

// --- 2. LOAD DATA ---
function loadData() {
    // Ambil data pelanggan
    Papa.parse(csvPelanggan, {
        download: true,
        complete: (results) => {
            document.getElementById('loading').style.display = 'none';
            tampilkanData(results.data.slice(1));
        }
    });

    // Ambil Nomor Firman - Pastikan ambil baris ke-2 (index 1), kolom D (index 3)
    Papa.parse(csvBendahara1, { download: true, complete: (r) => { noFirman = r.data[1][3]; } });
    // Ambil Nomor Rendi - Pastikan ambil baris ke-2 (index 1), kolom D (index 3)
    Papa.parse(csvBendahara2, { download: true, complete: (r) => { noRendi = r.data[1][3]; } });
}

// --- 3. TAMPILKAN DATA ---
function tampilkanData(data) {
    const container = document.getElementById('listPelanggan');
    container.innerHTML = ""; 
    data.forEach(row => {
        if (!row[0]) return;
        const nama = row[0].trim();
        const noPel = row[1] ? row[1] : "";
        const id = row[2] ? row[2] : "-";
        const tagihan = row[3] ? row[3] : "0";
        
        // AMBIL INFO BENDAHARA DI KOLOM E (Index ke-4)
        // Kita pastikan ambil kolom E dengan row[4]
        const petugas = row[4] ? row[4].toLowerCase().trim() : "";

        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <div class="info">
                <span class="nama">${nama}</span>
                <span class="detail">ID: ${id} | Rp ${tagihan}</span>
            </div>
            <div class="actions">
                <button class="btn-wa" onclick="kirimWA(this, '${nama}', '${noPel}', '${id}', '${tagihan}')">WA</button>
                <button class="btn-lunas" onclick="laporLunas(this, '${nama}', '${id}', '${tagihan}', '${petugas}')">Set Lunas</button>
            </div>
        `;
        container.appendChild(div);
    });
}

// --- 4. FUNGSI LAPOR LUNAS ---
async function laporLunas(btn, nama, id, tagihan, petugas) {
    if(!confirm("Set lunas untuk " + nama + "?")) return;

    // LOGIKA PEMISAH: Cek isi kolom E
    let targetWA = "";
    if (petugas === "firman") {
        targetWA = noFirman;
    } else if (petugas === "rendi") {
        targetWA = noRendi;
    } else {
        // Jika kolom E kosong atau salah ketik, kirim ke dua-duanya sebagai cadangan
        targetWA = noFirman + "," + noRendi;
    }

    if(!targetWA) { alert("Nomor bendahara belum termuat!"); return; }

    btn.innerText = "...";
    btn.disabled = true;

    try {
        // Simpan ke Google Sheets via Apps Script
        await fetch(URL_APPS_SCRIPT, {
            method: 'POST', mode: 'no-cors',
            body: new URLSearchParams({'nama': nama, 'id': id, 'nominal': tagihan})
        });

        // Kirim WA via Fonnte hanya ke target yang benar
        await fetch('https://api.fonnte.com/send', {
            method: 'POST',
            headers: { 'Authorization': TOKEN_FONNTE },
            body: new URLSearchParams({
                'target': targetWA,
                'message': `${nama}: Status: LUNAS ✅`
            })
        });

        btn.innerText = "LUNAS ✅";
        btn.style.backgroundColor = "#6c757d";
    } catch (e) {
        alert("Gagal kirim!");
        btn.disabled = false;
        btn.innerText = "Set Lunas";
    }
}

// Fungsi kirimWA (Tagihan Pelanggan)
async function kirimWA(btn, nama, noWa, id, tagihan) {
    const bulan = document.getElementById('bulanSelect').value;
    const tgl = document.getElementById('tglTempo').value;
    let hp = noWa.replace(/[^0-9]/g, '');
    if (hp.startsWith('0')) hp = '62' + hp.substring(1);
    const pesan = `Pelanggan SENGKUNI NET\nYth. *${nama}*\nTagihan internet *${bulan}.${new Date().getFullYear()}*\nID: *${id}*\nTotal: *Rp ${tagihan}*\nAdmin: RENDI & FIRMAN`;
    btn.innerText = "...";
    try {
        await fetch('https://api.fonnte.com/send', {
            method: 'POST', headers: { 'Authorization': TOKEN_FONNTE },
            body: new URLSearchParams({ 'target': hp, 'message': pesan })
        });
        btn.innerText = "OK ✅";
    } catch (e) { btn.innerText = "Error"; }
}

loadData();
</script>
