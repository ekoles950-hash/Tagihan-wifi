<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagihan Sengkuni Net</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
    .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; border-bottom: 2px solid #25D366; padding-bottom: 10px; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }
    .item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
    .info { display: flex; flex-direction: column; flex: 1; }
    .nama { font-weight: bold; font-size: 16px; color: #333; }
    .detail { font-size: 13px; color: #777; margin-top: 4px; }
    .actions { display: flex; gap: 5px; }
    .btn-wa { background-color: #25D366; color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
    .btn-lunas { background-color: #007bff; color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
    .btn-wa:hover { background-color: #128C7E; }
    .btn-lunas:hover { background-color: #0056b3; }
    .btn-wa:disabled, .btn-lunas:disabled { background-color: #ccc; cursor: not-allowed; }
    #loading { text-align: center; color: #666; font-style: italic; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tagihan Sengkuni Net</h2>
    
    <div class="form-group">
      <label>Pilih Bulan Tagihan:</label>
      <select id="bulanSelect">
        <option value="Januari">Januari</option>
        <option value="Februari">Februari</option>
        <option value="Maret">Maret</option>
        <option value="April" selected>April</option>
        <option value="Mei">Mei</option>
        <option value="Juni">Juni</option>
        <option value="Juli">Juli</option>
        <option value="Agustus">Agustus</option>
        <option value="September">September</option>
        <option value="Oktober">Oktober</option>
        <option value="November">November</option>
        <option value="Desember">Desember</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tanggal Jatuh Tempo:</label>
      <input type="number" id="tglTempo" value="4" placeholder="Contoh: 4">
    </div>

    <div id="loading">Memuat data pelanggan...</div>
    <div id="listPelanggan"></div>
  </div>

  <script>
    const TOKEN_FONNTE = "CEjeWxk7WvpFJaNL94Km"; 
    // URL Apps Script kamu dari screenshot tadi
    const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwpSA_UfqSUzK6JFZkvJkrftgOqRjKL-HzA8OLtfAQEaOM3iC3H90YjXv6pI3D-kGQ/exec";
    // Nomor HP Bendahara (Ganti dengan nomor Rendi/Firman yang benar, awali 62)
    const NO_BENDAHARA_1 = "628xxx"; 
    const NO_BENDAHARA_2 = "6281329936605"; 

const csvUrl2 = "https://script.google.com/macros/s/AKfycbwpSA_UfqSUzK6JFZkvJkrftgOqRjKL-HzA8OLtfAQEaOM3iC3H90YjXv6pI3D-kGQ/exec";
    const csvUrl = "https://script.google.com/macros/s/AKfycbwpSA_UfqSUzK6JFZkvJkrftgOqRjKL-HzA8OLtfAQEaOM3iC3H90YjXv6pI3D-kGQ/exec";

    Papa.parse(csvUrl, { 
      download: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        const dataPelanggan = results.data.slice(1);
        tampilkanData(dataPelanggan);
      },
      error: function() {
        document.getElementById('loading').innerHTML = '<span style="color:red;">Gagal memuat data CSV.</span>';
      }
    });

    function tampilkanData(data) {
      const container = document.getElementById('listPelanggan');
      data.forEach(row => {
        if (!row[0] || row[0].trim() === "") return;

        const nama = row[0].trim();
        const noWa = row[1] ? row[1].toString().trim() : "";
        const idPelanggan = row[2] ? row[2].trim() : "-";
        const tagihanRaw = row[3] ? row[3].toString().replace(/[^0-9]/g, '') : "0";
        
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="info">
            <span class="nama">${nama}</span>
            <span class="detail">ID: ${idPelanggan} | Rp ${tagihanRaw}</span>
          </div>
          <div class="actions">
            <button class="btn-wa" onclick="kirimWA(this, '${nama.replace(/'/g, "\\'")}', '${noWa}', '${idPelanggan}', '${tagihanRaw}')">WA</button>
            <button class="btn-lunas" onclick="laporLunas(this, '${nama.replace(/'/g, "\\'")}', '${idPelanggan}', '${tagihanRaw}')">Set Lunas</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // FUNGSI BARU: LAPOR KE BENDAHARA & APPS SCRIPT
    async function laporLunas(btn, nama, idPelanggan, tagihan) {
      if(!confirm("Konfirmasi pembayaran lunas untuk " + nama + "?")) return;

      const originalText = btn.innerText;
      btn.innerText = "Proses...";
      btn.disabled = true;

      try {
        // 1. Kirim ke Google Sheets (via Apps Script)
        await fetch(URL_APPS_SCRIPT, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify({
            nama: nama,
            id: idPelanggan,
            nominal: tagihan,
            tanggal: new Date().toLocaleString()
          })
        });

        // 2. Kirim Notifikasi WA ke Bendahara via Fonnte
        const pesanBendahara = `*LAPORAN PEMBAYARAN LUNAS*\n\n` +
                               `Nama: *${nama}*\n` +
                               `ID: *${idPelanggan}*\n` +
                               `Nominal: *Rp ${tagihan}*\n` +
                               `Status: *LUNAS*\n` +
                               `Waktu: ${new Date().toLocaleString()}\n\n` +
                               `Data otomatis masuk ke Google Sheets.`;

        await fetch('https://api.fonnte.com/send', {
          method: 'POST',
          headers: { 'Authorization': TOKEN_FONNTE },
          body: new URLSearchParams({
            'target': `${NO_BENDAHARA_1},${NO_BENDAHARA_2}`, // Kirim ke kedua bendahara
            'message': pesanBendahara
          })
        });

        btn.innerText = "LUNAS ✅";
        btn.style.backgroundColor = "#6c757d";
      } catch (err) {
        alert("Gagal lapor lunas!");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }

    async function kirimWA(btn, nama, noWa, idPelanggan, tagihan) {
      const bulan = document.getElementById('bulanSelect').value;
      const tgl = document.getElementById('tglTempo').value;
      const tahun = new Date().getFullYear();
      
      let hp = noWa.replace(/[^0-9]/g, '');
      if (hp.startsWith('0')) hp = '62' + hp.substring(1);

      const pesan = `sistem chat otomatis tidak perlu di balas❌\n` +
                    `Pelanggan SENGKUNI NET\n` +
                    `Yth. *${nama}*\n` +
                    `Kami sampaikan tagihan layanan internet bulan *${bulan}.${tahun}*\n` +
                    `Dengan ID Pelanggan *${idPelanggan}*\n` +
                    `Sebesar *Rp ${tagihan}*\n` +
                    `Pembayaran paling lambat di tanggal *${tgl}*\n` +
                    `Pembayaran nunggu tukang narik\n` +
                    `Admin bendahara : RENDI dan FIRMAN\n` +
                    `untuk menghindari isolir kecepatan menurun otomatis di jaringan anda`;

      const originalText = btn.innerText;
      btn.innerText = "...";
      btn.disabled = true;

      try {
        const response = await fetch('https://api.fonnte.com/send', {
          method: 'POST',
          headers: { 'Authorization': TOKEN_FONNTE },
          body: new URLSearchParams({
            'target': hp,
            'message': pesan,
            'countryCode': '62'
          })
        });

        const result = await response.json();
        if (result.status) {
          btn.innerText = "OK ✅";
          btn.style.backgroundColor = "#128C7E";
        } else {
          alert("Gagal: " + result.reason);
          btn.innerText = originalText;
          btn.disabled = false;
        }
      } catch (err) {
        alert("Koneksi Error!");
        btn.innerText = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body> 
</html>
