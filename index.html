<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sengkuni Net Admin</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1a1a1a; margin-bottom: 20px; border-bottom: 3px solid #25D366; padding-bottom: 10px; }
    
    .summary-box { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #c8e6c9; text-align: center; }
    .summary-box span { display: block; font-size: 14px; color: #2e7d32; font-weight: bold; }
    .summary-box #totalDisplay { font-size: 24px; color: #1b5e20; }

    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; font-size: 14px; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; background: #fff; }
    
    .item { border-bottom: 1px solid #eee; padding: 15px 0; }
    .nama { font-weight: bold; font-size: 17px; color: #222; text-transform: capitalize; }
    .detail { font-size: 14px; color: #666; margin-top: 3px; margin-bottom: 10px; }
    
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; transition: 0.2s; text-align: center; }
    
    .btn-wa { background-color: #25D366; } /* WA Biasa */
    .btn-fonnte { background-color: #00a884; } /* WA Fonnte */
    .btn-lunas { background-color: #007bff; }
    .btn-lapor { background-color: #f39c12; }
    
    .btn:active { transform: scale(0.95); opacity: 0.9; }
    #loading { text-align: center; color: #888; font-style: italic; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tagihan Sengkuni Net</h2>
    
    <div class="summary-box">
      <span>TOTAL GABUNGAN HARI INI:</span>
      <strong id="totalDisplay">Rp 0</strong>
    </div>

    <div class="form-group">
      <label>Token Fonnte:</label>
      <input type="text" id="fonnteToken" placeholder="Masukkan Token Fonnte Anda" value="">
    </div>

    <div class="form-group">
      <label>Pilih Bulan Tagihan:</label>
      <select id="bulanSelect">
        <option value="Januari">Januari</option>
        <option value="Februari">Februari</option>
        <option value="Maret">Maret</option>
        <option value="April">April</option>
        <option value="Mei" selected>Mei</option>
        <option value="Juni">Juni</option>
        <option value="Juli">Juli</option>
        <option value="Agustus">Agustus</option>
        <option value="September">September</option>
        <option value="Oktober">Oktober</option>
        <option value="November">November</option>
        <option value="Desember">Desember</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tanggal Jatuh Tempo:</label>
      <input type="number" id="tglTempo" value="4">
    </div>

    <div id="loading">Memuat data pelanggan...</div>
    <div id="listPelanggan"></div>
  </div>

  <script>
    // Konfigurasi API
    const TELEGRAM_TOKEN = "8669839359:AAGPkRpOiLlYoBc3t4IgxcAGSgKFC8v1SwU";
    const TELEGRAM_CHAT_ID = "7933777456";
    let totalGabungan = 0;

    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV673nBl_6Wn_6eBjiJzoSQfHDn0VQRCNTGsjrdo2fLPFZenxVD1MBvatyIJ8mTGuZX58w5UI3uII9/pub?output=csv";

    Papa.parse(csvUrl, {
      download: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        tampilkanData(results.data.slice(1));
      }
    });

    function tampilkanData(data) {
      const container = document.getElementById('listPelanggan');
      data.forEach(row => {
        if (!row[0] || row[0].trim() === "") return;
        
        const nama = row[0].trim();
        const noWa = row[1] ? row[1].toString().trim() : "";
        const idPel = row[2] ? row[2].trim() : "-";
        const harga = row[3] ? row[3].toString().replace(/[^0-9]/g, '') : "0";
        
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="info">
            <span class="nama">${nama}</span>
            <span class="detail">ID: ${idPel} | <b>Rp ${parseInt(harga).toLocaleString('id-ID')}</b></span>
          </div>
          <div class="actions">
            <button class="btn btn-wa" onclick="kirimWAManual('${nama}', '${noWa}', '${idPel}', '${harga}')">WA Biasa</button>
            <button class="btn btn-fonnte" onclick="kirimFonnte('${nama}', '${noWa}', '${idPel}', '${harga}', this)">Fonnte</button>
            <button class="btn btn-lunas" onclick="markLunas(this)">Set Lunas</button>
            <button class="btn btn-lapor" onclick="laporTelegram('${nama}', '${harga}', this)">Lapor</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function generatePesan(nama, idPel, harga) {
      const bulan = document.getElementById('bulanSelect').value;
      const tgl = document.getElementById('tglTempo').value;
      const tahun = new Date().getFullYear();
      const formatHarga = parseInt(harga).toLocaleString('id-ID');

      return `sistem chat otomatis tidak perlu di balas❌\n` +
             `Pelanggan SENGKUNI NET\n` +
             `Yth. *${nama}*\n` +
             `Kami sampaikan tagihan layanan internet bulan *${bulan}.${tahun}*\n` +
             `Dengan ID Pelanggan *${idPel}*\n` +
             `Sebesar *Rp ${formatHarga}*\n` +
             `Pembayaran paling lambat di tanggal *${tgl}*\n` +
             `Pembayaran nunggu tukang narik\n` +
             `Admin bendahara : RENDI dan FIRMAN\n` +
             `untuk menghindari isolir kecepatan menurun otomatis di jaringan anda`;
    }

    function formatNomor(no) {
      let hp = no.replace(/[^0-9]/g, '');
      if (hp.startsWith('0')) hp = '62' + hp.substring(1);
      return hp;
    }

    function kirimWAManual(nama, noWa, idPel, harga) {
      const pesan = generatePesan(nama, idPel, harga);
      const hp = formatNomor(noWa);
      window.open(`https://wa.me/${hp}?text=${encodeURIComponent(pesan)}`, '_blank');
    }

    function kirimFonnte(nama, noWa, idPel, harga, btn) {
      const token = document.getElementById('fonnteToken').value;
      if (!token) return alert('Masukkan Token Fonnte dulu, Mas!');

      const pesan = generatePesan(nama, idPel, harga);
      const hp = formatNomor(noWa);

      btn.innerText = "Mengirim...";
      btn.disabled = true;

      const formData = new FormData();
      formData.append('target', hp);
      formData.append('message', pesan);

      fetch('https://api.fonnte.com/send', {
        method: 'POST',
        headers: { 'Authorization': token },
        body: formData
      })
      .then(res => res.json())
      .then(data => {
        if (data.status) {
          btn.innerText = "Terkirim ✓";
          btn.style.backgroundColor = "#7f8c8d";
        } else {
          alert('Gagal via Fonnte: ' + data.reason);
          btn.innerText = "Fonnte";
          btn.disabled = false;
        }
      })
      .catch(err => alert('Error Fonnte: ' + err));
    }

    function laporTelegram(nama, harga, btn) {
      const bulan = document.getElementById('bulanSelect').value;
      const nominal = parseInt(harga);
      totalGabungan += nominal;
      document.getElementById('totalDisplay').innerText = "Rp " + totalGabungan.toLocaleString('id-ID');

      const text = `💰 *LAPORAN MASUK*\n` +
                   `👤 Nama : *${nama}*\n` +
                   `📅 Bulan : ${bulan}\n` +
                   `💵 Masuk : *Rp ${nominal.toLocaleString('id-ID')}*\n` +
                   `📈 *TOTAL GABUNGAN : Rp ${totalGabungan.toLocaleString('id-ID')}*\n` +
                   `⏰ ${new Date().toLocaleString('id-ID')}`;

      fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`)
      .then(res => {
        if(res.ok) {
          btn.innerText = 'Dilaporkan ✓';
          btn.style.backgroundColor = '#7f8c8d';
          btn.disabled = true;
        }
      });
    }

    function markLunas(btn) {
      btn.style.backgroundColor = '#bdc3c7';
      btn.innerText = 'Lunas ✓';
      btn.disabled = true;
    }
  </script>
</body>
</html>
