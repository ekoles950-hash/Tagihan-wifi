<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagihan Sengkuni Net</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 20px; margin: 0; }
    .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; border-bottom: 2px solid #25D366; padding-bottom: 10px; }
    
    /* Style Menu Tab Navigasi */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 12px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; background-color: #e0e0e0; color: #555; transition: 0.3s; }
    .tab-btn.active { background-color: #25D366; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 8px; color: #444; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; }
    
    /* Card Dashboard Monitor */
    .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
    .card { background: #f8f9fa; border-left: 4px solid #007bff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card.lunas { border-left-color: #25D366; }
    .card.belum { border-left-color: #dc3545; }
    .card h4 { margin: 0; color: #666; font-size: 14px; }
    .card p { margin: 5px 0 0 0; font-size: 20px; font-weight: bold; color: #333; }

    .item, .item-sheet { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
    .info { display: flex; flex-direction: column; flex: 1; }
    .nama, .nama-sheet { font-weight: bold; font-size: 16px; color: #333; }
    .detail, .detail-sheet { font-size: 13px; color: #777; margin-top: 4px; }
    .actions, .actions-sheet { display: flex; gap: 5px; }
    
    .btn-wa { background-color: #25D366; color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
    .btn-lunas, .btn-lunas-sheet { background-color: #007bff; color: white; border: none; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.3s; }
    .btn-sync { background-color: #8e44ad; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-bottom: 15px; display: none; }
    .btn-reset { background-color: #dc3545; color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; margin-top: 20px; transition: 0.3s; }
    
    .btn-wa:hover { background-color: #128C7E; }
    .btn-lunas:hover, .btn-lunas-sheet:hover { background-color: #0056b3; }
    .btn-reset:hover { background-color: #bd2130; }
    button:disabled { background-color: #ccc !important; cursor: not-allowed; }
    #loading, #loading-sheet { text-align: center; color: #666; font-style: italic; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tagihan Sengkuni Net</h2>
    
    <div class="tabs">
      <button id="btn-tab-monitor" class="tab-btn active" onclick="bukaTab('monitor')">🖥️ Monitor Tagihan</button>
      <button id="btn-tab-pelanggan" class="tab-btn" onclick="bukaTab('pelanggan')">📝 Data Sengkuni Net</button>
    </div>

    <div class="form-group">
      <label>Pilih Bulan Tagihan:</label>
      <select id="bulanSelect">
        <option value="Januari">Januari</option>
        <option value="Februari">Februari</option>
        <option value="Maret">Maret</option>
        <option value="April" selected>April</option>
        <option value="Mei">Mei</option>
        <option value="Juni">Juni</option>
        <option value="Juli">Juli</option>
        <option value="Agustus">Agustus</option>
        <option value="September">September</option>
        <option value="Oktober">Oktober</option>
        <option value="November">November</option>
        <option value="Desember">Desember</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tanggal Jatuh Tempo:</label>
      <input type="number" id="tglTempo" value="4">
    </div>

    <div id="tab-monitor" class="tab-content active">
      <div class="dashboard-grid">
        <div class="card lunas">
          <h4>PEMASUKAN (LUNAS)</h4>
          <p id="dashPemasukan">Rp 0</p>
        </div>
        <div class="card belum">
          <h4>KLIEN BELUM BAYAR</h4>
          <p id="dashBelumBayar">0 Orang</p>
        </div>
        <div class="card belum">
          <h4>NOMINAL BELUM BAYAR</h4>
          <p id="dashNominalBelum">Rp 0</p>
        </div>
      </div>
      <div id="loading">Memuat database Monitor...</div>
      <div id="listMonitor"></div>
      
      <button id="btn-reset-db" class="btn-reset" onclick="resetDatabaseSupabase()">🔄 Reset Database Ke Bulan Berikutnya</button>
    </div>

    <div id="tab-pelanggan" class="tab-content">
      <button id="btn-kirim-semua" class="btn-sync" onclick="laporSemuaKeSupabase()">Kirim Semua Data ke Monitor Tagihan</button>
      <div id="loading-sheet">Memuat data Excel pelanggan...</div>
      <div id="listPelanggan"></div>
    </div>

  </div>

  <script>
    // --- KONFIGURASI LINK UTAMA ---
    const TOKEN_FONNTE = "CEjeWxk7WvpFJaNL94Km";
    const SCRIPT_FIRMAN = "https://script.google.com/macros/s/AKfycbwpSA_UfqSUzK6JFZkvJkrftgOqRjKL-HzA8OLtfAQEaOM3iC3H90YjXv6pI3D-kGQ/exec";
    const SCRIPT_RENDI = "https://script.google.com/macros/s/AKfycbwpSA_UfqSUzK6JFZkvJkrftgOqRjKL-HzA8OLtfAQEaOM3iC3H90YjXv6pI3D-kGQ/exec"; 
    const csvPelanggan = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV673nBl_6Wn_6eBjiJzoSQfHDn0VQRCNTGsjrdo2fLPFZenxVD1MBvatyIJ8mTGuZX58w5UI3uII9/pub?output=csv";

    // Kredensial Proyek Supabase
    const SUPABASE_URL = "https://wfcmhdqtoftuyfjtyfkk.supabase.co"; 
    const SUPABASE_KEY = "sb_publishable_TE45MyojofIEUkZyvLkHmg_xnsk92Ld"; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // HP Bendahara Lapangan Sengkuni Net
    const hpFirman = "6282243047166"; 
    const hpRendi = "6285600409940"; 

    let dataMassalSupabase = [];

    function bukaTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('tab-' + tabName).classList.add('active');
      if(tabName === 'monitor') document.getElementById('btn-tab-monitor').classList.add('active');
      if(tabName === 'pelanggan') document.getElementById('btn-tab-pelanggan').classList.add('active');
    }

    // --- FITUR MONITOR: SINKRONISASI & HITUNG REAL-TIME ---
    async function muatDataDashboard() {
      try {
        const { data, error } = await supabaseClient.from('laporan_tagihan').select('*');
        if (error) throw error;

        document.getElementById('loading').style.display = 'none';

        let totalPemasukan = 0;
        let totalBelumBayar = 0;
        let nominalBelumBayar = 0;
        const listMonitor = document.getElementById('listMonitor');
        listMonitor.innerHTML = "";

        if(data && data.length > 0) {
          data.forEach(row => {
            const namaKlien = row.nama_klien;
            const tagihan = parseInt(row.jumlah_tagihan) || 0;
            
            let status = 'BELUM BAYAR';
            if (row.status_bayar) { status = row.status_bayar.toUpperCase().trim(); }
            else if (row.status) { status = row.status.toUpperCase().trim(); }

            if (status === 'LUNAS') {
              totalPemasukan += tagihan;
            } else {
              totalBelumBayar++;
              nominalBelumBayar += tagihan;
            }

            // REVISI: Tombol Set Lunas melempar variabel nama_klien dengan benar ke database
            let tombolAksiDepan = "";
            if (status !== 'LUNAS') {
              tombolAksiDepan = `<button class="btn-lunas" onclick="setLunasMurniDariMonitor('${namaKlien}', this)">Set Lunas</button>`;
            }

            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
              <div class="info">
                <span class="nama">${namaKlien}</span>
                <span class="detail">Tagihan: Rp ${tagihan.toLocaleString('id-ID')} | <b>${status}</b></span>
              </div>
              <div class="actions">
                ${tombolAksiDepan}
              </div>
            `;
            listMonitor.appendChild(div);
          });
        } else {
          listMonitor.innerHTML = "<div style='text-align:center; color:#999; padding: 20px;'>Belum ada data di Monitor. Silakan kirim data dari Tab Data Sengkuni Net.</div>";
        }

        document.getElementById('dashPemasukan').innerText = `Rp ${totalPemasukan.toLocaleString('id-ID')}`;
        document.getElementById('dashBelumBayar').innerText = `${totalBelumBayar} Orang`;
        document.getElementById('dashNominalBelum').innerText = `Rp ${nominalBelumBayar.toLocaleString('id-ID')}`;

      } catch (e) {
        console.log("Gagal memuat dashboard Supabase:", e);
      }
    }

    // --- FIX: FUNGSI TOMBOL MONITOR DEPAN AGAR LANGSUNG MASUK PEMASUKAN ---
    async function setLunasMurniDariMonitor(namaKlienTarget, btn) {
      if(!confirm("Set Lunas untuk " + namaKlienTarget + "?")) return;
      btn.innerText = "...";
      btn.disabled = true;

      try {
        // Tembak update status_bayar dan status langsung ke target nama_klien
        const { error } = await supabaseClient
          .from('laporan_tagihan')
          .update({ status_bayar: 'LUNAS', status: 'LUNAS' })
          .eq('nama_klien', namaKlienTarget);

        if (error) throw error;

        btn.innerText = "Lunas ✅";
        btn.style.backgroundColor = "#6c757d";
        
        // Memanggil fungsi re-kalkulasi agar angka PEMASUKAN (LUNAS) langsung bertambah real-time
        muatDataDashboard();
      } catch (e) {
        alert("Gagal memperbarui status lunas: " + e.message);
        btn.innerText = "Set Lunas";
        btn.disabled = false;
      }
    }

    function ambilDataExcel() {
      Papa.parse(csvPelanggan, {
        download: true,
        complete: function(results) {
          document.getElementById('loading-sheet').style.display = 'none';
          tampilkanDataSheet(results.data.slice(1));
          if(dataMassalSupabase.length > 0) document.getElementById('btn-kirim-semua').style.display = 'block';
        }
      });
    }

    function tampilkanDataSheet(data) {
      const container = document.getElementById('listPelanggan');
      container.innerHTML = "";
      dataMassalSupabase = []; 

      data.forEach(row => {
        if (!row[0]) return;
        const nama = row[0].trim();
        const noWa = row[1] ? row[1].toString().trim() : "";
        const idPel = row[2] ? row[2].trim() : "-";
        const harga = row[3] ? row[3].toString().replace(/[^0-9]/g, '') : "0";
        const petugas = row[4] ? row[4].toLowerCase().trim() : "";
        
        let nominalAngka = parseInt(harga) || 0;

        dataMassalSupabase.push({ 
          nama_klien: nama, 
          jumlah_tagihan: nominalAngka,
          status_bayar: 'BELUM BAYAR'
        });
        
        const div = document.createElement('div');
        div.className = 'item-sheet';
        div.innerHTML = `
          <div class="info">
            <span class="nama-sheet">${nama}</span>
            <span class="detail-sheet">ID: ${idPel} | <b>Rp ${nominalAngka.toLocaleString('id-ID')}</b></span>
          </div>
          <div class="actions-sheet">
            <button class="btn-sheet btn-wa" onclick="kirimFonnte('${nama}', '${noWa}', '${idPel}', '${harga}', this)">WA</button>
            <button class="btn-sheet btn-lunas-sheet" onclick="setLunas('${nama}', '${idPel}', '${harga}', '${petugas}', this)">Set Lunas</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function buatPesan(nama, idPel, harga) {
      const bulan = document.getElementById('bulanSelect').value;
      const tgl = document.getElementById('tglTempo').value;
      return `Pelanggan SENGKUNI NET\nYth. *${nama}*\nTagihan internet *${bulan}.${new Date().getFullYear()}*\nID: *${idPel}*\nTotal: *Rp ${harga}*\nTempo: tgl *${tgl}*\nAdmin: RENDI & FIRMAN`;
    }

    async function kirimFonnte(nama, noWa, idPel, harga, btn) {
      let hp = noWa.replace(/[^0-9]/g, ''); if (hp.startsWith('0')) hp = '62' + hp.substring(1);
      btn.innerText = "...";
      try {
        await fetch('https://api.fonnte.com/send', { 
          method: 'POST', 
          headers: { 'Authorization': TOKEN_FONNTE }, 
          body: new URLSearchParams({ 'target': hp, 'message': buatPesan(nama, idPel, harga) }) 
        });
        btn.innerText = "OK ✅";
      } catch (e) { btn.innerText = "Error"; }
    }

    async function setLunas(nama, id, harga, petugas, btn) {
      if(!confirm("Lunas untuk " + nama + "?")) return;
      
      let scriptUrl = SCRIPT_FIRMAN; 
      let tujuanWA = "";
      if (petugas === "firman") { tujuanWA = hpFirman; scriptUrl = SCRIPT_FIRMAN; }
      else if (petugas === "rendi") { tujuanWA = hpRendi; scriptUrl = SCRIPT_RENDI; }
      else { tujuanWA = hpFirman + "," + hpRendi; }

      btn.innerText = "...";
      btn.disabled = true;

      try {
        await supabaseClient
          .from('laporan_tagihan')
          .update({ status_bayar: 'LUNAS', status: 'LUNAS' })
          .eq('nama_klien', nama);

        await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', body: new URLSearchParams({ 'nama': nama, 'id': id, 'nominal': harga }) });
        
        await fetch('https://api.fonnte.com/send', {
          method: 'POST',
          headers: { 'Authorization': TOKEN_FONNTE },
          body: new URLSearchParams({
            'target': tujuanWA,
            'message': `✅ *LAPORAN LUNAS*\nNama: ${nama}\nID: ${id}\nNominal: Rp ${harga}\nPetugas: ${petugas.toUpperCase()}`
          })
        });

        btn.innerText = "LUNAS ✅"; 
        btn.style.backgroundColor = "#6c757d";
        muatDataDashboard(); 
      } catch (e) { 
        alert("Gagal memproses lunas"); 
        btn.disabled = false;
        btn.innerText = "Set Lunas";
      }
    }

    async function laporSemuaKeSupabase() {
      if(!confirm("Kirim SEMUA data ini ke Monitor Tagihan?")) return;
      if(dataMassalSupabase.length === 0) {
        alert("Data kosong, sinkronisasi dibatalkan!");
        return;
      }

      const btn = document.getElementById('btn-kirim-semua');
      btn.innerText = "Mengirim... ⏳"; btn.disabled = true; btn.style.backgroundColor = "#9b59b6";

      const dataKirimClean = JSON.parse(JSON.stringify(dataMassalSupabase));

      const { error } = await supabaseClient.from('laporan_tagihan').insert(dataKirimClean);
      
      if (error) {
        alert("Gagal kirim massal ke Supabase: " + error.message); 
        btn.innerText = "Kirim Semua Data"; 
        btn.disabled = false; 
        btn.style.backgroundColor = "#8e44ad";
      } else {
        btn.innerText = "Terkirim! ✅"; btn.style.backgroundColor = "#27ae60";
        muatDataDashboard();
        alert("Data berhasil disinkron! Silakan cek di Tab Monitor.");
        bukaTab('monitor'); 
      }
    }

    async function resetDatabaseSupabase() {
      const konfirmasi = prompt("⚠️ PERINGATAN KELOLA DATA BULANAN!\nTindakan ini akan MENGHAPUS TOTAL semua data monitor tagihan saat ini.\n\nKetik kata 'RESET' untuk melanjutkan:");
      if (konfirmasi !== "RESET") {
        alert("Reset dibatalkan.");
        return;
      }

      const btn = document.getElementById('btn-reset-db');
      btn.innerText = "Mengosongkan Database... ⏳";
      btn.disabled = true;

      try {
        const { error } = await supabaseClient
          .from('laporan_tagihan')
          .delete()
          .neq('nama_klien', 'KOLOM_YANG_TIDAK_MUNGKIN_ADA');

        if (error) throw error;
        alert("Database Sengkuni Net berhasil dikosongkan!");
        muatDataDashboard();
      } catch (e) {
        alert("Gagal mereset database bulanan: " + e.message);
      } finally {
        btn.innerText = "🔄 Reset Database Ke Bulan Berikutnya";
        btn.disabled = false;
      }
    }

    muatDataDashboard();
    ambilDataExcel();
    setInterval(muatDataDashboard, 10000); 
  </script>
</body>
</html>
