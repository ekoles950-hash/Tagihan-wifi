<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tagihan Sengkuni Net</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; padding: 15px; margin: 0; }
    .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #1a1a1a; margin-bottom: 25px; border-bottom: 3px solid #25D366; padding-bottom: 10px; }

    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; font-size: 14px; }
    select, input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; outline: none; box-sizing: border-box; background: #fff; }
    
    .item { border-bottom: 1px solid #eee; padding: 15px 0; }
    .nama { font-weight: bold; font-size: 17px; color: #222; text-transform: capitalize; }
    .detail { font-size: 14px; color: #666; margin-top: 3px; margin-bottom: 10px; display: block; }
    
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; transition: 0.2s; text-align: center; outline: none; }
    
    .btn-fonnte { background-color: #00a884; }
    .btn-lunas { background-color: #007bff; }
    .btn-wa { background-color: #25D366; }
    .btn-supabase { background-color: #8e44ad; } 
    
    .btn:active { transform: scale(0.95); opacity: 0.9; }
    .btn:disabled { background-color: #ccc; cursor: not-allowed; }
    #loading { text-align: center; color: #888; font-style: italic; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Tagihan Sengkuni Net</h2>

    <div class="form-group">
      <label>Pilih Bulan Tagihan:</label>
      <select id="bulanSelect">
        <option value="Januari">Januari</option>
        <option value="Februari">Februari</option>
        <option value="Maret">Maret</option>
        <option value="April">April</option>
        <option value="Mei">Mei</option>
        <option value="Juni" selected>Juni</option>
      </select>
    </div>

    <div class="form-group">
      <label>Tanggal Jatuh Tempo:</label>
      <input type="number" id="tglTempo" value="4">
    </div>

    <button id="btn-kirim-semua" class="btn btn-supabase" style="width: 100%; padding: 15px; font-size: 16px; margin-top: 10px; margin-bottom: 20px; border-radius: 10px; display: none;" onclick="laporSemuaKeSupabase()">🚀 Kirim Semua Data ke Monitor (Web 1)</button>

    <div id="loading">Memuat data pelanggan...</div>
    <div id="listPelanggan"></div>
  </div>

  <script>
    // --- KONFIGURASI API ASLI ---
    const TOKEN_FONNTE = "CEjeWxk7WvpFJaNL94Km";
    
    const SCRIPT_FIRMAN = "https://script.google.com/macros/s/AKfycbwpSA_UfqSUzK6JFZkvJkrftgOqRjKL-HzA8OLtfAQEaOM3iC3H90YjXv6pI3D-kGQ/exec";
    const SCRIPT_RENDI = "https://script.google.com/macros/s/LINK_SCRIPT_RENDI_DI_SINI"; 

    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSV673nBl_6Wn_6eBjiJzoSQfHDn0VQRCNTGsjrdo2fLPFZenxVD1MBvatyIJ8mTGuZX58w5UI3uII9/pub?output=csv";

    // --- KONFIGURASI SUPABASE ---
    const supabaseUrl = 'https://wfcmhdqtoftuyfjtyfkk.supabase.co';
    const supabaseKey = 'sb_publishable_TE45MyojofIEUkZyvLkHmg_xnsk92Ld';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    
    // VARIABEL PENAMPUNG DATA MASSAL SUPABASE
    let dataMassalSupabase = [];

    // --- LOAD DATA ---
    Papa.parse(csvUrl, {
      download: true,
      complete: function(results) {
        document.getElementById('loading').style.display = 'none';
        tampilkanData(results.data.slice(1));
        
        // Munculkan tombol kirim semua jika data sudah siap
        if(dataMassalSupabase.length > 0) {
           document.getElementById('btn-kirim-semua').style.display = 'block';
        }
      }
    });

    function tampilkanData(data) {
      const container = document.getElementById('listPelanggan');
      dataMassalSupabase = []; // Reset data massal

      data.forEach(row => {
        if (!row[0]) return;
        const nama = row[0].trim();
        const noWa = row[1] ? row[1].toString().trim() : "";
        const idPel = row[2] ? row[2].trim() : "-";
        const harga = row[3] ? row[3].toString().replace(/[^0-9]/g, '') : "0";
        const petugas = row[4] ? row[4].toLowerCase().trim() : "";
        
        // Simpan ke array untuk bulk insert Supabase
        dataMassalSupabase.push({
          nama_klien: nama,
          jumlah_tagihan: harga,
          status: 'belum bayar'
        });
        
        const div = document.createElement('div');
        div.className = 'item';
        
        // Desain 3 Tombol (Set Lunas dibuat memanjang ke samping agar rapi)
        div.innerHTML = `
          <div class="info">
            <span class="nama">${nama}</span>
            <span class="detail">ID: ${idPel} | <b>Rp ${parseInt(harga).toLocaleString('id-ID')}</b></span>
          </div>
          <div class="actions">
            <button class="btn btn-wa" onclick="kirimFonnte('${nama}', '${noWa}', '${idPel}', '${harga}', this)">Kirim Tagihan</button>
            <button class="btn btn-supabase" onclick="laporSupabase('${nama}', '${harga}', this)">Lapor Supabase</button>
            <button class="btn btn-lunas" style="grid-column: span 2;" onclick="setLunas('${nama}', '${idPel}', '${harga}', '${petugas}', this)">Set Lunas</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    // --- FUNGSI PESAN ---
    function buatPesan(nama, idPel, harga) {
      const bulan = document.getElementById('bulanSelect').value;
      const tgl = document.getElementById('tglTempo').value;
      return `sistem chat otomatis tidak perlu di balas❌\nPelanggan SENGKUNI NET\nYth. *${nama}*\nKami sampaikan tagihan layanan internet bulan *${bulan}.${new Date().getFullYear()}*\nDengan ID Pelanggan *${idPel}*\nSebesar *Rp ${parseInt(harga).toLocaleString('id-ID')}*\nPembayaran paling lambat di tanggal *${tgl}*\nPembayaran nunggu tukang narik\nAdmin bendahara : RENDI dan FIRMAN\nuntuk menghindari isolir kecepatan menurun otomatis di jaringan anda`;
    }

    // --- FUNGSI KIRIM TAGIHAN FONNTE ---
    async function kirimFonnte(nama, noWa, idPel, harga, btn) {
      let hp = noWa.replace(/[^0-9]/g, '');
      if (hp.startsWith('0')) hp = '62' + hp.substring(1);
      
      btn.innerText = "Mengirim...";
      try {
        await fetch('https://api.fonnte.com/send', {
          method: 'POST',
          headers: { 'Authorization': TOKEN_FONNTE },
          body: new URLSearchParams({ 'target': hp, 'message': buatPesan(nama, idPel, harga) })
        });
        btn.innerText = "Terkirim ✅";
        btn.style.backgroundColor = "#7f8c8d";
      } catch (e) { btn.innerText = "Gagal"; }
    }

    // --- FUNGSI KIRIM KE SUPABASE (SATUAN) ---
    async function laporSupabase(nama, harga, btn) {
      btn.innerText = "Proses...";
      btn.disabled = true;

      const { data, error } = await supabaseClient
        .from('laporan_tagihan')
        .insert([{ 
          nama_klien: nama, 
          jumlah_tagihan: harga, 
          status: 'belum bayar' 
        }]);
      
      if (error) {
        alert("Gagal sinkronisasi Supabase: " + error.message);
        btn.innerText = "Lapor Supabase";
        btn.disabled = false;
      } else {
        btn.innerText = "Supabase ✅";
        btn.style.backgroundColor = "#7f8c8d";
      }
    }

    // --- FUNGSI KIRIM KE SUPABASE (MASSAL) ---
    async function laporSemuaKeSupabase() {
      if(!confirm("Kirim SEMUA data klien ini ke dashboard Monitor (Web 1)?")) return;

      const btn = document.getElementById('btn-kirim-semua');
      const originalText = btn.innerText;
      btn.innerText = "Sedang Mengirim Massal... ⏳";
      btn.disabled = true;
      btn.style.backgroundColor = "#9b59b6";

      const { data, error } = await supabaseClient
        .from('laporan_tagihan')
        .insert(dataMassalSupabase);
      
      if (error) {
        alert("Gagal kirim massal: " + error.message);
        btn.innerText = originalText;
        btn.disabled = false;
        btn.style.backgroundColor = "#8e44ad";
      } else {
        btn.innerText = "Semua Data Berhasil Dikirim! ✅";
        btn.style.backgroundColor = "#27ae60";
        
        // Ubah tampilan semua tombol supabase satuan biar kelihatan sudah dikirim
        const tombolSatuan = document.querySelectorAll('.btn-supabase[onclick^="laporSupabase"]');
        tombolSatuan.forEach(b => {
          b.innerText = "Supabase ✅";
          b.style.backgroundColor = "#7f8c8d";
          b.disabled = true;
        });
      }
    }

    // --- FUNGSI SET LUNAS APPS SCRIPT ---
    async function setLunas(nama, id, harga, petugas, btn) {
      if(!confirm("Set Lunas untuk " + nama + "?")) return;
      
      let scriptUrl = (petugas === "rendi") ? SCRIPT_RENDI : SCRIPT_FIRMAN;
      btn.innerText = "...";

      try {
        await fetch(scriptUrl, {
          method: 'POST',
          mode: 'no-cors',
          body: new URLSearchParams({ 'nama': nama, 'id': id, 'nominal': harga })
        });
        btn.innerText = "Lunas ✅";
        btn.style.backgroundColor = "#6c757d";
        btn.disabled = true;
      } catch (e) { alert("Error Apps Script"); }
    }
  </script>
</body>
</html>
